<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css"
    />
  </head>

  <body>
    <div class="Anim">
      <span class="particle" style="--i: 5"></span>
      <span class="particle" style="--i: 10"></span>
      <span class="particle" style="--i: 11"></span>
      <span class="particle" style="--i: 13"></span>
      <span class="particle" style="--i: 40"></span>
      <span class="particle" style="--i: 12"></span>
      <span class="particle" style="--i: 15"></span>
      <span class="particle" style="--i: 30"></span>
      <span class="particle" style="--i: 19"></span>
      <span class="particle" style="--i: 21"></span>
      <span class="particle" style="--i: 39"></span>
      <span class="particle" style="--i: 15"></span>
      <span class="particle" style="--i: 6"></span>
      <span class="particle" style="--i: 39"></span>
      <span class="particle" style="--i: 15"></span>
      <span class="particle" style="--i: 6"></span>
      <span class="particle" style="--i: 37"></span>
      <span class="particle" style="--i: 12"></span>
      <span class="particle" style="--i: 8"></span>
      <span class="particle" style="--i: 45"></span>
      <span class="particle" style="--i: 35"></span>
    </div>

    <div class="header">
      <ul>
        <li><a class="home" onclick="onHome(event)">Home</a></li>
        <li><a class="projectt" onclick="onLoad(event)">Projects</a></li>
      </ul>
    </div>
    <div class="body-content">
      <div class="social-media">
        <div class="link-container">
          <a target="_blank" href="https://github.com/gwang08">
            <i class="fa-brands fa-github"></i>
          </a>
          <a
            target="_blank"
            href="https://www.linkedin.com/in/gwangprogrammer/"
          >
            <i class="fa-brands fa-linkedIn"></i>
          </a>
          <a
            target="_blank"
            href="https://www.facebook.com/minhwan0209/"
          >
            <i class="fa-brands fa-facebook-f"></i>
          </a>
        </div>
        <div class="img-container">
          <img src="/Image/gmail.png" alt="Gwang" />
          <p>leminhquang.2992@gmail.com</p>
        </div>
      </div>

      <div class="project">
        <div class="main-container">
          <div class="slide-title">
            <div class="title-container-still" id="left-i">
              <i
                class="fa fa-caret-left carett"
                aria-hidden="true"
                onclick="switchProject(-1)"
              ></i>
            </div>
            <div class="title-container-still" id="left-t">
              <h2
                class="left-title next-title"
                onclick="switchProject(-1)"
              ></h2>
            </div>
            <div class="title-container-still" id="main-t">
              <h2 class="main-title"></h2>
            </div>
            <div class="title-container-still" id="right-t">
              <h2
                class="right-title next-title"
                onclick="switchProject(1)"
              ></h2>
            </div>
            <div class="title-container-still" id="right-i">
              <i
                class="fa fa-caret-right carett"
                aria-hidden="true"
                onclick="switchProject(1)"
              ></i>
            </div>
          </div>
          <h4 class="sub-title"></h4>
          <div class="rows main-content">
            <div class="col-12 col-md-6 left-container">
              <div id="left-content" class="rows content"></div>
            </div>
            <div class="col-12 col-md-6 right-container">
              <div id="right-content" class="rows content"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
